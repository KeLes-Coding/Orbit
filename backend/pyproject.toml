[project]
name = "orbit-backend"
version = "0.1.0"
description = "Orbit MVP backend"
requires-python = ">=3.10"
dependencies = [
    "alembic",
    "asyncpg",
    "email-validator",
    "fastapi",
    "langchain-core",
    "langchain-ollama",
    "langchain-openai",
    "PyJWT",
    "pydantic-settings",
    "sqlalchemy",
    "uvicorn",
]

[tool.setuptools.packages.find]
include = ["app*"]
exclude = ["alembic*"]

[tool.ruff]
target-version = "py310"
line-length = 100
